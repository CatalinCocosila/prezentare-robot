<!DOCTYPE html>
<html lang="ro">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Blockly Robot Controller</title>
        <script src="https://cdn.jsdelivr.net/npm/blockly/blockly_compressed.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/blockly/blocks_compressed.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/blockly/javascript_compressed.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/blockly/msg/en.js"></script>
        <script src="https://cdn.tailwindcss.com"></script>
        <script src="blockly-local.js" defer></script>
        <style>
            .fixed-bottom-button {
                position: fixed;
                bottom: 20px;
                left: 50%;
                transform: translateX(-50%);
                padding: 12px 24px;
                background-color: #4CAF50;
                color: white;
                font-size: 16px;
                font-weight: bold;
                border: none;
                border-radius: 8px;
                cursor: pointer;
                box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
                transition: background-color 0.3s ease;
                z-index: 1000;
            }
            .fixed-bottom-button:hover {
                background-color: #45a049;
            }
        </style>
    </head>
<body class="bg-gray-200 flex flex-col items-center justify-center w-screen h-screen m-0 overflow-hidden">
    <div class="w-full h-full flex flex-col items-center justify-center">
        <div id="blocklyDiv" class="w-full h-full border border-gray-300 shadow-lg"></div>
    </div>
    <button onclick="runProgram()" class="fixed-bottom-button">
        🚀 Start Program
    </button>
    
    <xml id="toolbox" style="display: none">
        <block type="on_start"></block>
        <block type="move_forward"></block>
        <block type="move_backward"></block>
        <block type="turn_left"></block>
        <block type="turn_right"></block>
        <block type="repeat_n"></block>
    </xml>
</body>
</html>
